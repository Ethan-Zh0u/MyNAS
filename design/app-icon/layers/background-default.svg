<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background (Default / Light) — full bleed, system applies mask -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5EA2F5"/>
      <stop offset="1" stop-color="#806FF0"/>
    </linearGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <ellipse cx="320" cy="210" rx="430" ry="370" fill="#FFFFFF" opacity="0.30" filter="url(#softGlow)"/>
</svg>
